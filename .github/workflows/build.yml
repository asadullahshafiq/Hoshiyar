name: Build Hoshiyar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger button bhi hoga

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code download karo
      uses: actions/checkout@v3

    - name: Java 17 setup karo
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Android SDK setup
      uses: android-actions/setup-android@v2

    - name: Gradle permission do
      run: chmod +x gradlew

    - name: APK banao
      run: ./gradlew assembleDebug

    - name: APK download ke liye upload karo
      uses: actions/upload-artifact@v3
      with:
        name: Hoshiyar-Assistant-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
