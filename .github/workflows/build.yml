name: Build Hoshiyar APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.1'

    - uses: android-actions/setup-android@v3

    - name: Vosk Model Download karo aur APK mein bundle karo
      run: |
        mkdir -p app/src/main/assets
        cd app/src/main/assets
        wget -q https://alphacephei.com/vosk/models/vosk-model-small-en-in-0.4.zip
        unzip -q vosk-model-small-en-in-0.4.zip
        mv vosk-model-small-en-in-0.4 vosk-model
        rm vosk-model-small-en-in-0.4.zip
        echo "Model ready!"

    - name: APK banao
      run: gradle assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: Hoshiyar-Assistant-APK
        path: app/build/outputs/apk/debug/app-debug.apk
